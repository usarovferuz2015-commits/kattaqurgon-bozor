<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#16a34a" />
    <meta name="description" content="Kattaqo'rg'on bozori - Online marketplace platformasi" />
    <meta property="og:title" content="Kattaqo'rg'on Bozori" />
    <meta property="og:description" content="Kattaqo'rg'on bozorining rasmiy online platformasi" />
    <meta property="og:image" content="/og-image.png" />

    <title>Kattaqo'rg'on Bozori</title>
  </head>
  <body class="bg-gray-50 min-h-screen">
    <div id="root"></div>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        const errorDiv = document.createElement('div');
        errorDiv.style.position = 'fixed';
        errorDiv.style.top = '0';
        errorDiv.style.left = '0';
        errorDiv.style.width = '100%';
        errorDiv.style.padding = '20px';
        errorDiv.style.background = 'red';
        errorDiv.style.color = 'white';
        errorDiv.style.zIndex = '99999';
        errorDiv.innerText = 'Error: ' + message + ' at ' + lineno + ':' + colno;
        document.body.appendChild(errorDiv);
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
